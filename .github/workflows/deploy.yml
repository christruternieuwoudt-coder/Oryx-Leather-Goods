name: Deploy Next.js Static Export to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime Environment
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Application Dependencies
        run: npm install --no-audit --no-fund

      - name: Execute Next.js Compilation Static Generation Build Engine
        run: npm run build

      - name: Upload Static Export Build Artifacts Stack
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out/Oryx-Leather-Goods

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Discharging Assets Engine Deployment Pipeline
        id: deployment
        uses: actions/deploy-pages@v4
